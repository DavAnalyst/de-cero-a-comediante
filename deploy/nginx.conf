server {
    listen 80;
    server_name tudominio.com www.tudominio.com;
    # Certbot añadirá las directivas SSL aquí

    # Frontend estático — servir archivos del repo directamente
    root /var/www/de-cero-a-comediante/frontend;
    index index.html;

    # Rutas del frontend: cualquier cosa que no sea /api
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend Flask via Gunicorn (socket Unix más eficiente que puerto TCP)
    location /api/ {
        proxy_pass http://unix:/run/gunicorn/dca.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    # Archivos estáticos con caché agresiva
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Seguridad
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    client_max_body_size 10M;
}
