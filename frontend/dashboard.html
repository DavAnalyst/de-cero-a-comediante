<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Curso — De Cero a Comediante</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body class="dashboard-page">
  <nav class="top-nav">
    <div class="nav-brand">🎤 De Cero a Comediante</div>
    <div class="nav-user">
      <span id="user-name">Cargando...</span>
      <button id="logout-btn" class="btn btn-ghost btn-sm">Salir</button>
    </div>
  </nav>

  <main class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2 id="course-title">Cargando curso...</h2>
        <div class="overall-progress">
          <div class="progress-label">
            <span>Progreso general</span>
            <span id="overall-pct">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="overall-bar" style="width:0%"></div>
          </div>
        </div>
      </div>
      <nav class="module-nav" id="module-nav">
        <!-- Populated by dashboard.js -->
      </nav>
      <div class="sidebar-footer">
        <a href="index.html" class="btn btn-ghost btn-sm">← Inicio</a>
      </div>
    </aside>

    <section class="content-area">
      <div id="empty-state" class="empty-state">
        <div class="empty-icon">🎤</div>
        <h2>Bienvenido/a al curso</h2>
        <p>Selecciona una lección del panel izquierdo para comenzar.</p>
        <button id="continue-btn" class="btn btn-primary btn-lg hidden">Continuar donde lo dejé</button>
      </div>

      <div id="modules-container" class="modules-container hidden">
        <!-- Populated by dashboard.js -->
      </div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
