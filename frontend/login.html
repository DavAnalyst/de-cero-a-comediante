<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — De Cero a Comediante</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-brand">
      <a href="index.html">🎤 De Cero a Comediante</a>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Iniciar sesión</button>
        <button class="auth-tab" data-tab="register">Registrarme</button>
      </div>

      <!-- Login form -->
      <form id="login-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="login-email">Correo electrónico</label>
          <input type="email" id="login-email" placeholder="tu@correo.com" required />
        </div>
        <div class="form-group">
          <label for="login-password">Contraseña</label>
          <input type="password" id="login-password" placeholder="••••••••" required />
        </div>
        <div id="login-error" class="form-error hidden"></div>
        <button type="submit" class="btn btn-primary btn-full">Entrar</button>
      </form>

      <!-- Register form -->
      <form id="register-form" class="auth-form hidden" novalidate>
        <div class="form-group">
          <label for="reg-name">Nombre completo</label>
          <input type="text" id="reg-name" placeholder="Tu nombre" required />
        </div>
        <div class="form-group">
          <label for="reg-email">Correo electrónico</label>
          <input type="email" id="reg-email" placeholder="tu@correo.com" required />
        </div>
        <div class="form-group">
          <label for="reg-password">Contraseña</label>
          <input type="password" id="reg-password" placeholder="Mínimo 8 caracteres" required minlength="8" />
        </div>
        <div id="register-error" class="form-error hidden"></div>
        <button type="submit" class="btn btn-primary btn-full">Crear cuenta</button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
